<!DOCTYPE html>
<html lang="pt-br">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineFlix</title>

    <link rel="stylesheet" href="Style/style.css">


</head>
<body>

    <header>

        <h1>CineFlix</h1>

        <div class="header-actions">
            <button id="favoritos">Favoritos</button>
            <button id="voltar" style="display: none;">Voltar</button>
            <button id="login">Login</button>
            <button id="tema">Tema</button>
        </div>

    </header>
    
    <section class="banner">

        <img id="slide" src="https://picsum.photos/id/1018/1200/400">

    </section>

    <section class="login">

        <h2 id="mensagem">Bem-vindo(a)!</h2>

    </section>

    <section class="filmes">
        <div class="card">
            <img src="https://picsum.photos/id/237/300/400">
            <h3>Filme 1</h3>
            <button class="favoritar">Favoritar</button>
        </div>
        <div class="card">
            <img src="https://picsum.photos/id/238/300/400">
            <h3>Filme 2</h3>
            <button class="favoritar-2">Favoritar</button>
        </div>
        <div class="card">
            <img src="https://picsum.photos/id/239/300/400">
            <h3>Filme 3</h3>
            <button class="favoritar-3">Favoritar</button>
        </div>
    </section>
    <section id="favoritos-section" style="display: none;">
        <h2>Meus Favoritos</h2>
        <div id="lista-favoritos"></div>
    </section>

    <div id="modal-login" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Identifique-se</h2>
            <form id="login-form">
                <label for="usuario">Usuário:</label>
                <input type="text" id="usuario" name="usuario" required>
                <label for="senha">Senha:</label>
                <input type="password" id="senha" name="senha" required>
                <button type="submit">Entrar</button>
            </form>
        </div>
    </div>

    <script src="Script/script.js"></script>

</body>
</html>
